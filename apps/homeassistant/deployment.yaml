apiVersion: apps/v1
kind: Deployment
metadata:
  name: homeassistant
  labels:
    role: homeassistant
spec:
  replicas: 1
  selector:
    matchLabels:
      role: homeassistant
  template:
    metadata:
      labels:
        role: homeassistant
    spec:
      containers:
        - name: homeassistant
          volumeMounts:
            - mountPath: /config
              name: config
          image: homeassistant/home-assistant:stable
          ports:
            - containerPort: 8123
          env:
            - name: TZ
              value: "Europe/Berlin"
            # recorder connection string, pulled from the DB secret.
            # Referenced in configuration.yaml as: db_url: !env_var DB_URL
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: homeassistant-db
                  key: DB_URL
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: homeassistant-config
