apiVersion: apps/v1
kind: Deployment
metadata:
  name: homeassistant
  labels:
    role: homeassistant
spec:
  replicas: 1
  selector:
    matchLabels:
      role: homeassistant
  template:
    metadata:
      labels:
        role: homeassistant
    spec:
      containers:
        - name: homeassistant
          volumeMounts:
            - mountPath: /config
              name: config
          image: homeassistant/home-assistant:stable
          ports:
            - containerPort: 8123
          env:
            - name: TZ
              value: "Europe/Berlin"
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: homeassistant-config
