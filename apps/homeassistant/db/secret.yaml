apiVersion: v1
kind: Secret
metadata:
  name: homeassistant-db
type: Opaque
stringData:
  # sealed-secrets / SOPS, or pull from Secret Manager. Never commit real creds.
  POSTGRES_DB: homeassistant
  POSTGRES_USER: hass
  POSTGRES_PASSWORD: change-me-strong-password
  # SQLAlchemy URL HA's recorder will use. Host = the DB Service name.
  DB_URL: postgresql://hass:change-me-strong-password@homeassistant-db:5432/homeassistant
