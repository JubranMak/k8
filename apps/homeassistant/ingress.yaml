apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homeassistant
  annotations:
    # Home Assistant uses WebSockets for the live UI — allow long-lived upgrades.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: ha.home.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: homeassistant-internal
                port:
                  number: 8123
